name: Python Bindings Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/test_python_bindings.py'
      - 'Cargo.toml'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/test_python_bindings.py'
      - 'Cargo.toml'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'

permissions:
  contents: read

jobs:
  test-python-bindings:
    name: Test Python bindings (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.9', '3.12']
        include:
          - os: macos-latest
            python: '3.13'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest maturin

      - name: Build and install Python bindings
        run: |
          # Create a virtualenv for maturin develop
          python -m venv .venv
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pip install pytest
          maturin develop
        shell: bash

      - name: Run Python tests
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pytest tests/test_python_bindings.py -v
        shell: bash

      - name: Run Rust tests (unit tests only)
        run: cargo test --lib -- --skip debug_ --skip regression_ --skip lambda_ --skip table4_
