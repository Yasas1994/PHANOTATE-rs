{% set name = "phanotate-rs" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/Yasas1994/PHANOTATE-rs/archive/refs/tags/v{{ version }}.tar.gz
  sha256: PLACEHOLDER_SHA256

build:
  number: 0
  script:
    - cargo install --locked --root "$PREFIX" --path .  # [not win]
    - cargo install --locked --root %PREFIX% --path .   # [win]

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - cargo

test:
  commands:
    - phanotate-rs --version

about:
  home: https://github.com/Yasas1994/PHANOTATE-rs
  summary: 'Fast Rust implementation of PHANOTATE with automatic genetic-code detection'
  description: |
    PHANOTATE-rs is a fast Rust reimplementation of PHANOTATE, a gene caller
    optimized for bacteriophage genomes. It includes automatic genetic-code
    detection, multi-threading, and supports six NCBI translation tables
    relevant to phage biology.
  license: GPL-3.0
  license_file: LICENSE
  dev_url: https://github.com/Yasas1994/PHANOTATE-rs

extra:
  recipe-maintainers:
    - deprekate
    - yasaswijesekara
